# Source of truth for repository labels. Synced by .github/workflows/sync-labels.yml.
# Edit this file + open a PR; the workflow updates GitHub when the change lands on main.
# Existing labels not listed here are preserved (skip-delete: true in the workflow).

# Type — what kind of work. Auto-applied by the matching issue template.
- name: "type:bug"
  color: "d73a4a"
  description: "Something is broken."
- name: "type:idea"
  color: "a2eeef"
  description: "New feature or enhancement proposal."
- name: "type:task"
  color: "0e8a16"
  description: "General work item — chore, refactor, follow-up."
- name: "type:docs"
  color: "0075ca"
  description: "Documentation only."

# Area — which part of the codebase. Apply at least one when triaging.
- name: "area:scoring"
  color: "fef2c0"
  description: "lib/scoring + scoring SQL functions."
- name: "area:predict"
  color: "fef2c0"
  description: "Prediction UI + actions (round 1 + bracket)."
- name: "area:admin"
  color: "fef2c0"
  description: "Admin dashboard + admin actions."
- name: "area:supabase"
  color: "fef2c0"
  description: "Migrations, RLS, types, clients."
- name: "area:football-data"
  color: "fef2c0"
  description: "football-data.org client + sync."
- name: "area:infra"
  color: "fef2c0"
  description: "CI, hooks, repo plumbing."
- name: "area:ui"
  color: "fef2c0"
  description: "General UI/UX outside predict."

# Priority — set during triage.
- name: "prio:P0"
  color: "b60205"
  description: "Blocks shipping or correctness — fix now."
- name: "prio:P1"
  color: "d93f0b"
  description: "Important but not blocking."
- name: "prio:P2"
  color: "fbca04"
  description: "Nice to have."

# Meta.
- name: "status:blocked"
  color: "5319e7"
  description: "Waiting on something or someone. Use sparingly; prefer the Project column for status."
- name: "good-first-issue"
  color: "7057ff"
  description: "Small, well-scoped — good for someone picking up the project."
