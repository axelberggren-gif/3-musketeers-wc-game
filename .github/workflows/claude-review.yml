name: claude-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: read
  id-token: write

jobs:
  review:
    # Only review non-draft PRs from trusted authors. author_association is one of
    # OWNER / MEMBER / COLLABORATOR for people on the repo; anyone else (drive-by
    # forks, untrusted accounts) skips review entirely so they can't trigger an
    # auto-merge.
    if: |
      github.event.pull_request.draft == false &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          # Authenticate against the maintainer's Claude Pro/Max subscription
          # (generated locally via `claude setup-token`) rather than a metered
          # API key. Usage counts against the subscription's included limits.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # The action's default tool allowlist excludes every `gh` Bash command
          # and every PR-write tool. Without this list, Claude can read the diff
          # but cannot post a review — which is exactly what happened on PRs #55
          # and #58 (action ran for minutes, drafted a review, posted nothing).
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Glob,Grep"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are reviewing this pull request. Before reading the diff, read
            AGENTS.md and any per-directory CLAUDE.md files for areas the PR
            touches — those are the canonical source of project invariants.

            ## Block (REQUEST_CHANGES) on

            1. **Correctness bugs**: logic errors, broken contracts, security
               issues (XSS, SQLi, command injection, secrets exposure), race
               conditions, RLS leaks, unhandled error branches that crash prod.

            2. **Project invariants** (from AGENTS.md + CLAUDE.md files):
               - **Points sync**: any change to `POINTS` values in
                 `lib/scoring/rules.ts` MUST have a matching SQL function update
                 in a NEW migration (not an edit to 0002/0005). Same for
                 `FIFA_RANKINGS_2026` ↔ `teams.fifa_ranking` seed.
               - **Migrations are append-only**: no edits to any existing
                 `supabase/migrations/000N_*.sql` file — only new numbered files.
               - **Cron auth**: every handler under `app/api/cron/*` verifies
                 `CRON_SECRET` via the `authorized()` pattern.
               - **Service-role guard**: `supabaseService()` never called from
                 user-facing routes without an explicit authorization check
                 above it (it bypasses RLS).
               - **RLS-first for picks**: pick visibility before kickoff is
                 enforced by RLS, not application code.
               - **Server-action shape**: server actions return
                 `{ ok: true } | { ok: false; error: string }` and the UI
                 handles both branches.
               - **AI co-author trailer**: every commit on the PR ends with
                 `Co-authored-by: Claude <noreply@anthropic.com>` (or the
                 appropriate agent trailer).
               - **Idempotent scoring**: writes to `point_awards` go through
                 the `score_*()` SQL functions, never raw inserts.

            3. **Test coverage** for new logic:
               - New functions in `lib/scoring/`, `lib/predictions/`,
                 `lib/banter/`, `lib/auth/`, or `lib/football-data/` need
                 a corresponding test, OR the PR body explains why not.
               - New migrations that add scoring/RLS logic need either a unit
                 test on the TS caller or an explicit justification.
               - Pure UI / styling / copy / docs PRs are exempt.

            ## Do NOT block on

            - Naming preferences, comment density, micro-refactors.
            - Hypothetical future scenarios not in the diff.
            - Style nits the existing codebase doesn't already follow.

            ## How to deliver the verdict

            Use `mcp__github_inline_comment__create_inline_comment` (with
            `confirmed: true`) for line-specific issues — one inline comment per
            blocker, anchored to the offending line.

            Then submit exactly one formal review via the `gh` CLI with a body
            summarising your findings:

            - If no blockers:
              `gh pr review ${{ github.event.pull_request.number }} --approve --body "<summary>"`

            - If at least one blocker:
              `gh pr review ${{ github.event.pull_request.number }} --request-changes --body "<summary>"`

            The gate step below reads the formal review's state (APPROVED /
            CHANGES_REQUESTED) and uses it to pass or fail this check. A
            missing review or a `COMMENT`-only review fails the gate. Do not
            output the review text as a chat message — only post via `gh pr
            review`.

      - name: Gate on bot verdict
        # Run even if the action step itself errored — we want a clear pass/fail
        # signal on this status check. Bot approvals don't count toward branch
        # protection's "Required approvals" rule (GitHub excludes
        # github-actions[bot] and most app bots), so the exit code of THIS step
        # is what gates auto-merge. Branch protection requires
        # `claude-review / review` to be green; this step encodes the verdict.
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          # The claude-code-action posts as either claude[bot] (Claude GitHub
          # App installation token) or github-actions[bot] (workflow token).
          # Take the most-recent review from either identity as the verdict.
          state=$(gh api "repos/$REPO/pulls/$PR/reviews" --jq '
            [.[] | select(.user.login == "claude[bot]" or .user.login == "github-actions[bot]")]
            | sort_by(.submitted_at)
            | last
            | .state // "NONE"
          ')
          echo "Latest bot review state: $state"
          case "$state" in
            APPROVED)
              echo "Bot approved — gate open."
              ;;
            CHANGES_REQUESTED)
              echo "::error::Bot requested changes — failing check to block merge."
              exit 1
              ;;
            *)
              echo "::error::No conclusive bot review found (state=$state)."
              exit 1
              ;;
          esac
