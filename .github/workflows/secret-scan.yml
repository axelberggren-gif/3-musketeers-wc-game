name: secret-scan

# Scans commits/PRs for committed secrets (API keys, tokens) with gitleaks.
# Defense-in-depth on top of GitHub-native secret scanning + push protection,
# which should also be enabled in Settings -> Code security (free on public repos).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # full history so the PR commit range can be scanned
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is only required for GitHub *organization* accounts.
          # This is a personal repo, so no license is needed. If it ever moves
          # under an org, add a GITLEAKS_LICENSE secret. See the action's README.
