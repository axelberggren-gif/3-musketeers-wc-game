name: dependency-review

# Blocks PRs that introduce dependencies with known-vulnerable versions or
# disallowed licenses, and surfaces OpenSSF Scorecard data on changed deps.
# Free on public repos; private repos need GitHub Advanced Security + the
# dependency graph enabled.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write # for the summary comment

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          # high + critical block the PR; moderate/low show in the summary only.
          # Tighten to "moderate" once the dependency set is stable.
          fail-on-severity: high
          comment-summary-in-pr: on-failure
