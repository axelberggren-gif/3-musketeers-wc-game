name: dependency-audit

# Free, private-repo-friendly replacement for GitHub's dependency-review action
# (which needs paid Advanced Security on private repos). Fails the check when a
# dependency has a known high/critical advisory. Dependabot (.github/dependabot.yml)
# does the actual upgrades; this is the gate. Tune the level with --audit-level.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
      # Reads package-lock.json against the npm advisory DB — no install needed.
      # high + critical fail; moderate/low are reported but non-blocking.
      - run: npm audit --audit-level=high
