name: pr-title-lint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [main]

permissions:
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@e32d7e603df1aa1ba07e981f2a23455dee596825 # v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            perf
            ci
            revert
            style
          requireScope: false
          subjectPattern: ^[a-z].+
          subjectPatternError: |
            The PR title subject must start with a lowercase letter and be at least
            two characters. Example: `feat(scoring): add tiebreaker`.
