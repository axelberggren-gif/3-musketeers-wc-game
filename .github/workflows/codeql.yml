name: codeql

# Static analysis (SAST) for JS/TS — catches injection, XSS, unsafe data flow,
# hardcoded-secret patterns, etc. deterministically, complementing the
# (non-deterministic) claude-review bot. Findings land in the repo Security tab.
# CodeQL is free on public repos; private repos need GitHub Advanced Security.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1" # Mondays 03:27 UTC — re-scan already-merged code for new advisories

permissions:
  contents: read
  security-events: write # upload findings to the Security tab
  actions: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: github/codeql-action/init@d77b13a0df3134d64a457ea9003f600b09fa1c8a # v3
        with:
          languages: javascript-typescript
          build-mode: none # JS/TS needs no compilation step
          queries: security-extended
      - uses: github/codeql-action/analyze@d77b13a0df3134d64a457ea9003f600b09fa1c8a # v3
        with:
          category: "/language:javascript-typescript"
